<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>iPhoneCongo - Admin</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-login { max-width: 400px; margin: 4rem auto; background: white; border-radius: var(--radius-lg); padding: 2rem; }
    </style>
</head>
<body>
    <div class="admin-login">
        <h2><i class="fas fa-lock"></i> Administration</h2>
        <form onsubmit="loginAdmin(event)">
            <div class="form-group">
                <label>Utilisateur</label>
                <input type="text" id="username" value="admin" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" value="Congo2024" required>
            </div>
            <button type="submit" class="btn-add-store">Connexion</button>
        </form>
    </div>
    <script>
        function loginAdmin(e) {
            e.preventDefault();
            if (document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'Congo2024') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert('Identifiants incorrects');
            }
        }
    </script>
</body>
</html>
