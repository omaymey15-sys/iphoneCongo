<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhoneCongo - Administration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-mobile-alt"></i>
            <h1>iPhone<span>Congo</span> Admin</h1>
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
            <a href="admin.html" class="active"><i class="fas fa-cog"></i> Administration</a>
        </nav>
    </header>

    <main>
        <div class="admin-panel">
            <div class="admin-header">
                <h2><i class="fas fa-plus-circle"></i> Publier un iPhone</h2>
                <p>Remplissez le formulaire pour ajouter un iPhone à la vente</p>
            </div>
            
            <form id="product-form" class="product-form">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Titre de l'annonce *</label>
                    <input type="text" id="title" placeholder="Ex: iPhone 13 Pro Max 256GB Or" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Modèle *</label>
                        <input type="text" id="model" placeholder="Ex: iPhone 13 Pro Max" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Prix (USD) *</label>
                        <input type="number" id="price" placeholder="1200" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-image"></i> Image de l'iPhone *</label>
                    <input type="url" id="image" placeholder="https://exemple.com/iphone-image.jpg" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Description *</label>
                    <textarea id="description" placeholder="État du téléphone, accessoires inclus, historique..." required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-clipboard-check"></i> État *</label>
                        <select id="condition" required>
                            <option value="">Sélectionnez l'état</option>
                            <option value="Neuf">✨ Neuf - Scellé</option>
                            <option value="Comme neuf">🌟 Comme neuf - Utilisé 1 mois</option>
                            <option value="Très bon état">👍 Très bon état - Quelques micro-rayures</option>
                            <option value="Bon état">👌 Bon état - Signes d'usage normaux</option>
                            <option value="Acceptable">🔄 Acceptable - Fonctionnel, quelques défauts</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-city"></i> Ville *</label>
                        <select id="city" required>
                            <option value="">Sélectionnez la ville</option>
                            <option value="Kinshasa">🇨🇩 Kinshasa</option>
                            <option value="Lubumbashi">🇨🇩 Lubumbashi</option>
                            <option value="Goma">🇨🇩 Goma</option>
                            <option value="Bukavu">🇨🇩 Bukavu</option>
                            <option value="Kisangani">🇨🇩 Kisangani</option>
                            <option value="Matadi">🇨🇩 Matadi</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-sim-card"></i> Capacité *</label>
                        <select id="storage" required>
                            <option value="">Sélectionnez la capacité</option>
                            <option value="64GB">64 GB</option>
                            <option value="128GB">128 GB</option>
                            <option value="256GB">256 GB</option>
                            <option value="512GB">512 GB</option>
                            <option value="1TB">1 TB</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-battery-full"></i> Batterie *</label>
                        <select id="battery" required>
                            <option value="">État de la batterie</option>
                            <option value="100%">100% - Comme neuve</option>
                            <option value="90-99%">90-99% - Excellente</option>
                            <option value="80-89%">80-89% - Bonne</option>
                            <option value="70-79%">70-79% - Acceptable</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Contact WhatsApp *</label>
                    <input type="text" id="contact" placeholder="+243 XXX XXX XXX" required>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-cloud-upload-alt"></i> Publier l'iPhone
                </button>
            </form>

            <div class="admin-products-section">
                <h2><i class="fas fa-list"></i> Annonces publiées</h2>
                <div id="admin-products-list" class="admin-products-list"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>iPhoneCongo Admin</h3>
                <p>Gérez vos annonces facilement</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 iPhoneCongo - Tous droits réservés</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
