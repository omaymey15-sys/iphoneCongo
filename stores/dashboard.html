<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhoneCongo - Mon Store</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .store-dashboard {
            max-width: 1200px;
            margin: 2rem auto;
        }
        
        .store-header {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .store-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--light);
            overflow: hidden;
            border: 3px solid var(--primary);
        }
        
        .store-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .store-info h2 {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        
        .store-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--gray);
            flex-wrap: wrap;
        }
        
        .store-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }
        
        .stat-card i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .stat-card h3 {
            font-size: 2rem;
            color: var(--dark);
        }
        
        .stat-card p {
            color: var(--gray);
        }
        
        .add-product-section {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }
        
        .add-product-section h3 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .products-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding: 1rem 0.5rem;
            scroll-behavior: smooth;
        }
        
        .product-card-store {
            min-width: 280px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            position: relative;
            border: 1px solid #eee;
        }
        
        .product-card-store img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: #fafafa;
            padding: 1rem;
        }
        
        .product-card-store .info {
            padding: 1rem;
            border-top: 1px solid #eee;
        }
        
        .product-card-store .title {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        
        .product-card-store .price {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 700;
        }
        
        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .btn-edit, .btn-delete {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-edit {
            background: var(--primary);
            color: white;
        }
        
        .btn-delete {
            background: var(--danger);
            color: white;
        }
        
        .btn-edit:hover, .btn-delete:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        
        .new-badge-store {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent);
            color: var(--dark);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
            animation: pulse 2s infinite;
        }
        
        .public-link {
            background: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            font-weight: 500;
        }
        
        .public-link:hover {
            background: #007a2f;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-store-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <nav>
            <a href="../index.html"><i class="fas fa-home"></i> Accueil</a>
            <a href="../store.html"><i class="fas fa-store"></i> Communauté</a>
            <a href="dashboard.html" class="active"><i class="fas fa-user"></i> Mon Store</a>
        </nav>
    </header>

    <main class="store-dashboard" id="dashboardContent">
        <!-- Le contenu sera chargé dynamiquement -->
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2024 iPhoneCongo - Stores partenaires</p>
        </div>
    </footer>

    <script src="stores.js"></script>
</body>
</html>
