<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>iPhoneCongo - Mon store</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 1rem auto;
        }
        
        /* Store Header */
        .store-profile-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            border: 1px solid var(--light-gray);
        }
        
        .profile-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: var(--shadow-md);
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-info h2 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
            color: var(--dark);
        }
        
        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 0.5rem 0;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .profile-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .profile-meta i {
            color: var(--primary);
        }
        
        .store-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-xl);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            text-decoration: none;
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        
        .btn-outline.danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .btn-outline.danger:hover {
            background: var(--danger);
            color: white;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--light-gray);
        }
        
        .stat-card i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }
        
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }
        
        .stat-card .label {
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        /* Add Product Form */
        .add-product-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--light-gray);
        }
        
        .add-product-card h3 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .add-product-card h3 i {
            font-size: 1rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            color: var(--dark);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem;
            border: 1.5px solid var(--light-gray);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
        }
        
        .btn-add-product {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-xl);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .btn-add-product:hover {
            background: var(--secondary-dark);
        }
        
        /* Products Section */
        .products-section {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--light-gray);
        }
        
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .products-header h3 {
            font-size: 1.2rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .products-header h3 i {
            font-size: 1rem;
        }
        
        .product-count {
            background: var(--light);
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-xl);
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .products-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding: 0.5rem 0 1rem 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        
        .product-card-store {
            min-width: 200px;
            background: var(--light);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--light-gray);
            position: relative;
        }
        
        .product-card-store img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            background: white;
            padding: 0.8rem;
        }
        
        .product-card-store .info {
            padding: 0.8rem;
            background: white;
        }
        
        .product-card-store .title {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.2rem;
        }
        
        .product-card-store .price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .product-card-store .price::before {
            content: '$';
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .product-actions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        
        .product-actions button {
            flex: 1;
            padding: 0.3rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }
        
        .btn-edit {
            background: var(--primary);
            color: white;
        }
        
        .btn-delete {
            background: var(--danger);
            color: white;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--light-gray);
            margin-bottom: 1rem;
        }
        
        .empty-state p {
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        
        .modal-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            .store-profile-card {
                flex-direction: column;
                text-align: center;
            }
            
            .profile-meta {
                justify-content: center;
            }
            
            .store-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-store-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <div class="header-actions">
            <a href="../index.html" class="nav-link">accueil</a>
            <a href="../store.html" class="nav-link">stores</a>
        </div>
    </header>

    <main class="container">
        <div id="dashboardContent" class="dashboard-container">
            <div class="loading-spinner">Chargement de votre dashboard...</div>
        </div>
    </main>

    <!-- Modal d'édition -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Modifier le produit</h3>
            <form id="editForm" onsubmit="updateProductFromModal(event)">
                <input type="hidden" id="editProductId">
                
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="editCategory" required>
                        <option value="iphone">📱 iPhone</option>
                        <option value="samsung">📱 Samsung</option>
                        <option value="accessoire">🎧 Accessoire</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="editTitle" required>
                </div>
                
                <div class="form-group">
                    <label>Prix ($)</label>
                    <input type="number" id="editPrice" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="editImage" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editDescription" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label>État</label>
                    <select id="editCondition">
                        <option>Neuf</option>
                        <option>Reconditionné</option>
                        <option>Bon état</option>
                    </select>
                </div>
                
                <div class="modal-buttons">
                    <button type="submit" class="btn-add-product" style="flex:1;">
                        <i class="fas fa-save"></i> Enregistrer
                    </button>
                    <button type="button" class="btn-add-product" style="flex:1; background:var(--gray);" onclick="closeEditModal()">
                        <i class="fas fa-times"></i> Annuler
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2024 iPhoneCongo - Dashboard store</p>
    </footer>

    <script src="stores.js"></script>
    <script>
        // Variables globales
        let currentStoreId = null;
        let currentStore = null;
        
        // Chargement du dashboard
        async function loadDashboard() {
            const urlParams = new URLSearchParams(window.location.search);
            currentStoreId = parseInt(urlParams.get('id'));
            
            if (!currentStoreId) {
                showNotification('Store non trouvé', 'error');
                window.location.href = 'register.html';
                return;
            }
            
            // Vérifier l'authentification
            if (!checkStoreAuth(currentStoreId)) {
                showNotification('Veuillez vous connecter', 'error');
                window.location.href = 'login.html';
                return;
            }
            
            const stores = getStores();
            currentStore = stores.find(s => s.id === currentStoreId);
            
            if (!currentStore) {
                showNotification('Store non trouvé', 'error');
                window.location.href = 'register.html';
                return;
            }
            
            const products = getStoreProducts(currentStoreId);
            
            displayDashboard(currentStore, products);
        }
        
        function displayDashboard(store, products) {
            const container = document.getElementById('dashboardContent');
            
            // Calculer les stats
            const totalProducts = products.length;
            const newProducts = products.filter(p => (new Date() - new Date(p.date)) < 86400000).length;
            const totalViews = store.stats?.views || 0;
            
            // Générer le HTML
            let html = `
                <div class="store-profile-card">
                    <img src="${store.logo || 'https://via.placeholder.com/100x100?text=Store'}" 
                         alt="${store.name}" 
                         class="profile-logo"
                         onerror="this.src='https://via.placeholder.com/100x100?text=Store'">
                    <div class="profile-info">
                        <h2>${store.name}</h2>
                        <div class="profile-meta">
                            <span><i class="fas fa-map-marker-alt"></i> ${store.city || 'Ville non spécifiée'}</span>
                            <span><i class="fab fa-whatsapp"></i> ${store.whatsapp}</span>
                            <span><i class="fas fa-calendar"></i> Membre depuis ${new Date(store.date).toLocaleDateString()}</span>
                        </div>
                        <div class="store-actions">
                            <a href="store-view.html?store=${store.pseudo}" target="_blank" class="btn-outline">
                                <i class="fas fa-external-link-alt"></i> Voir ma page
                            </a>
                            <button class="btn-outline" onclick="copyStoreLink('${store.pseudo}')">
                                <i class="fas fa-copy"></i> Copier le lien
                            </button>
                            <button class="btn-outline danger" onclick="logoutStore()">
                                <i class="fas fa-sign-out-alt"></i> Déconnexion
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-box"></i>
                        <div class="value">${totalProducts}</div>
                        <div class="label">Produits</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div class="value">${newProducts}</div>
                        <div class="label">Nouveautés</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-eye"></i>
                        <div class="value">${totalViews}</div>
                        <div class="label">Vues</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-star"></i>
                        <div class="value">5.0</div>
                        <div class="label">Note</div>
                    </div>
                </div>
                
                <div class="add-product-card">
                    <h3><i class="fas fa-plus-circle"></i> Ajouter un produit</h3>
                    <form onsubmit="addProduct(event, ${store.id})">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Catégorie</label>
                                <select id="productCategory" required>
                                    <option value="iphone">📱 iPhone</option>
                                    <option value="samsung">📱 Samsung</option>
                                    <option value="accessoire">🎧 Accessoire</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>État</label>
                                <select id="productCondition">
                                    <option>Neuf</option>
                                    <option>Reconditionné</option>
                                    <option>Bon état</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Titre</label>
                                <input type="text" id="productTitle" placeholder="Ex: iPhone 13 128GB" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Prix ($)</label>
                                <input type="number" id="productPrice" step="0.01" placeholder="650" required>
                            </div>
                            
                            <div class="form-group full-width">
                                <label>Image URL</label>
                                <input type="url" id="productImage" placeholder="https://..." required>
                            </div>
                            
                            <div class="form-group full-width">
                                <label>Description</label>
                                <textarea id="productDescription" rows="2" placeholder="Description du produit..."></textarea>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-add-product">
                            <i class="fas fa-cloud-upload-alt"></i> Ajouter le produit
                        </button>
                    </form>
                </div>
                
                <div class="products-section">
                    <div class="products-header">
                        <h3><i class="fas fa-boxes"></i> Mes produits</h3>
                        <span class="product-count">${totalProducts} produit${totalProducts > 1 ? 's' : ''}</span>
                    </div>
                    
                    ${totalProducts === 0 ? `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <p>Vous n'avez pas encore de produits</p>
                            <p class="small">Ajoutez votre premier produit ci-dessus</p>
                        </div>
                    ` : `
                        <div class="products-scroll" id="productsScroll">
                            ${products.map(p => createProductCard(p, store)).join('')}
                        </div>
                    `}
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function createProductCard(product, store) {
            const isNew = (new Date() - new Date(product.date)) / (1000 * 60 * 60) <= 48;
            const priceFormatted = product.price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            
            return `
                <div class="product-card-store" data-id="${product.id}">
                    ${isNew ? '<span class="new-badge">✨ Nouveau</span>' : ''}
                    <img src="${product.image}" alt="${product.title}" 
                         onerror="this.src='https://via.placeholder.com/200x120?text=Image'">
                    <div class="info">
                        <div class="title">${product.title}</div>
                        <div class="price">${priceFormatted}</div>
                        <div class="product-actions">
                            <button class="btn-edit" onclick="openEditModal(${store.id}, ${product.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-delete" onclick="deleteProduct(${store.id}, ${product.id})">
                                <i class="fas fa-trash"></i> Del
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Ajouter un produit
        window.addProduct = function(event, storeId) {
            event.preventDefault();
            
            const product = {
                id: Date.now(),
                category: document.getElementById('productCategory').value,
                title: document.getElementById('productTitle').value,
                price: parseFloat(document.getElementById('productPrice').value),
                image: document.getElementById('productImage').value,
                description: document.getElementById('productDescription').value,
                condition: document.getElementById('productCondition').value,
                storeId: storeId,
                date: new Date().toISOString()
            };
            
            const products = getStoreProducts(storeId);
            products.unshift(product);
            saveStoreProducts(storeId, products);
            
            // Réinitialiser le formulaire
            document.getElementById('productTitle').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('productDescription').value = '';
            
            showNotification('✅ Produit ajouté avec succès');
            loadDashboard();
        };
        
        // Supprimer un produit
        window.deleteProduct = function(storeId, productId) {
            if (confirm('Supprimer ce produit ?')) {
                const products = getStoreProducts(storeId).filter(p => p.id !== productId);
                saveStoreProducts(storeId, products);
                showNotification('Produit supprimé', 'info');
                loadDashboard();
            }
        };
        
        // Ouvrir modal d'édition
        window.openEditModal = function(storeId, productId) {
            const products = getStoreProducts(storeId);
            const product = products.find(p => p.id === productId);
            
            if (product) {
                document.getElementById('editProductId').value = product.id;
                document.getElementById('editCategory').value = product.category;
                document.getElementById('editTitle').value = product.title;
                document.getElementById('editPrice').value = product.price;
                document.getElementById('editImage').value = product.image;
                document.getElementById('editDescription').value = product.description || '';
                document.getElementById('editCondition').value = product.condition;
                
                document.getElementById('editModal').classList.add('active');
            }
        };
        
        // Fermer modal
        window.closeEditModal = function() {
            document.getElementById('editModal').classList.remove('active');
        };
        
        // Mettre à jour depuis le modal
        window.updateProductFromModal = function(event) {
            event.preventDefault();
            
            const storeId = currentStoreId;
            const productId = parseInt(document.getElementById('editProductId').value);
            
            const products = getStoreProducts(storeId);
            const index = products.findIndex(p => p.id === productId);
            
            if (index !== -1) {
                products[index] = {
                    ...products[index],
                    category: document.getElementById('editCategory').value,
                    title: document.getElementById('editTitle').value,
                    price: parseFloat(document.getElementById('editPrice').value),
                    image: document.getElementById('editImage').value,
                    description: document.getElementById('editDescription').value,
                    condition: document.getElementById('editCondition').value
                };
                
                saveStoreProducts(storeId, products);
                closeEditModal();
                showNotification('✅ Produit mis à jour');
                loadDashboard();
            }
        };
        
        // Copier le lien du store
        window.copyStoreLink = function(pseudo) {
            const url = `${window.location.origin}/stores/store-view.html?store=${pseudo}`;
            navigator.clipboard.writeText(url).then(() => {
                showNotification('Lien copié !');
            });
        };
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
