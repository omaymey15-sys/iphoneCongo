<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhoneCongo - Mon store</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard {
            max-width: 1200px;
            margin: 1rem auto;
        }
        
        .store-profile {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border: 1px solid #eee;
        }
        
        .profile-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }
        
        .profile-info h2 {
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
        }
        
        .profile-info p {
            color: var(--gray);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-item {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid #eee;
        }
        
        .stat-item i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }
        
        .stat-item .number {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
        }
        
        .stat-item .label {
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .add-form {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eee;
        }
        
        .add-form h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }
        
        .products-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #eee;
        }
        
        .products-section h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        .product-actions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        
        .edit-btn, .delete-btn {
            flex: 1;
            padding: 0.3rem;
            border: none;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        
        .edit-btn {
            background: var(--primary);
            color: white;
        }
        
        .delete-btn {
            background: var(--danger);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-store-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <div class="header-actions">
            <a href="../index.html" class="nav-link">accueil</a>
            <a href="../store.html" class="nav-link">stores</a>
        </div>
    </header>

    <main class="container">
        <div id="dashboardContent" class="dashboard">
            <!-- Chargé dynamiquement -->
        </div>
    </main>

    <footer>
        <p>© 2024 iPhoneCongo - Dashboard</p>
    </footer>

    <script src="stores.js"></script>
</body>
</html>
