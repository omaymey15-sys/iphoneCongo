<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhoneCongo - Créer votre store</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .register-container {
            max-width: 600px;
            margin: 3rem auto;
            background: white;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .register-header i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .register-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .register-form {
            padding: 2rem;
        }
        
        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .form-section h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        
        .logo-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px dashed var(--primary);
        }
        
        .logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .logo-preview i {
            font-size: 3rem;
            color: var(--gray);
        }
        
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        
        .btn-register:hover {
            background: #007a2f;
            transform: scale(1.02);
        }
        
        .info-text {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-store-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <nav>
            <a href="../index.html"><i class="fas fa-home"></i> Accueil</a>
            <a href="../store.html"><i class="fas fa-store"></i> Communauté</a>
            <a href="register.html" class="active"><i class="fas fa-plus-circle"></i> Créer mon store</a>
        </nav>
    </header>

    <main>
        <div class="register-container">
            <div class="register-header">
                <i class="fas fa-store"></i>
                <h2>Créez votre store</h2>
                <p>Rejoignez la communauté iPhoneCongo</p>
            </div>
            
            <form class="register-form" onsubmit="registerStore(event)">
                <div class="form-section">
                    <h3><i class="fas fa-info-circle"></i> Informations du store</h3>
                    
                    <div class="form-group">
                        <label>Nom du store *</label>
                        <input type="text" id="storeName" placeholder="Ex: Phone Shop Lubumbashi" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ville *</label>
                            <select id="storeCity" required>
                                <option value="">Choisissez</option>
                                <option value="Lubumbashi">Lubumbashi</option>
                                <option value="Kolwezi">Kolwezi</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Pseudo unique *</label>
                            <input type="text" id="storePseudo" placeholder="Ex: phoneshoplubi" required>
                            <small class="info-text">Ce pseudo sera utilisé dans l'URL de votre store</small>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Adresse complète</label>
                        <input type="text" id="storeAddress" placeholder="Avenue, quartier, numéro">
                    </div>
                </div>
                
                <div class="form-section">
                    <h3><i class="fas fa-image"></i> Logo du store</h3>
                    
                    <div class="logo-upload">
                        <div class="logo-preview" id="logoPreview">
                            <i class="fas fa-store"></i>
                        </div>
                        <input type="file" id="storeLogo" accept="image/*" onchange="previewAndUploadLogo(event)">
                        <small>Format carré recommandé (max 2 Mo)</small>
                        <input type="hidden" id="logoUrl">
                        <div id="logoUploadStatus" style="margin-top:0.5rem; font-size:0.9rem;"></div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3><i class="fas fa-phone"></i> Contact</h3>
                    
                    <div class="form-group">
                        <label>Numéro WhatsApp *</label>
                        <input type="text" id="storeWhatsapp" placeholder="+243 XXX XXX XXX" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email (optionnel)</label>
                        <input type="email" id="storeEmail" placeholder="contact@store.com">
                    </div>
                </div>
                
                <div class="form-section">
                    <h3><i class="fas fa-lock"></i> Sécurité</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Mot de passe *</label>
                            <input type="password" id="storePassword" required>
                        </div>
                        <div class="form-group">
                            <label>Confirmer *</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-register">
                    <i class="fas fa-check-circle"></i> Créer mon store
                </button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2024 iPhoneCongo - Stores partenaires</p>
        </div>
    </footer>

    <script src="stores.js"></script>
</body>
</html>
