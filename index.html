<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhoneCongo - iPhone, Samsung & Accessoires</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-mobile-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <div class="header-search">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un produit...">
        </div>
        <nav>
            <a href="index.html" class="active">Accueil</a>
            <a href="store.html">Stores</a>
            <a href="stores/register.html">Devenir store</a>
        </nav>
    </header>

    <main>
        <!-- Hero simple -->
        <div class="page-title">
            <h2>iPhone & Samsung</h2>
            <p>Les meilleurs smartphones et accessoires à Lubumbashi & Kolwezi</p>
        </div>

        <!-- Section Nouveautés -->
        <section class="products-section">
            <h3 class="section-title">✨ Nouveautés</h3>
            <div class="products-grid" id="newProducts"></div>
        </section>

        <!-- Section iPhone -->
        <section class="products-section">
            <h3 class="section-title">📱 iPhone</h3>
            <div class="products-grid" id="iphoneProducts"></div>
        </section>

        <!-- Section Samsung -->
        <section class="products-section">
            <h3 class="section-title">🤖 Samsung</h3>
            <div class="products-grid" id="samsungProducts"></div>
        </section>

        <!-- Section Accessoires -->
        <section class="products-section">
            <h3 class="section-title">🎧 Accessoires</h3>
            <div class="products-grid" id="accessoryProducts"></div>
        </section>

        <!-- Pagination -->
        <div class="pagination">
            <span class="page active">1</span>
            <span class="page">2</span>
            <span class="page">3</span>
            <span class="next">→</span>
        </div>
    </main>

    <footer>
        <p>© 2024 iPhoneCongo • Lubumbashi & Kolwezi • <i class="fab fa-whatsapp"></i> <a href="https://wa.me/243972685669">+243 972 685 669</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
