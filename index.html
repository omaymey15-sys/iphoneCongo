<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>iPhoneCongo - Store Officiel</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/logo.svg" alt="iPhoneCongo" style="height: 40px; width: auto; margin-right: 0.5rem;">
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <div class="header-actions">
            <a href="store.html" class="nav-link">stores</a>
            <i class="fas fa-search search-icon" onclick="toggleSearch()"></i>
        </div>
    </header>

    <main>
        <!-- Hero mini -->
        <div class="hero-mini">
            <h2>iPhoneCongo</h2>
            <p>Lubumbashi • Kolwezi</p>
        </div>

        <!-- Barre de recherche (cachée par défaut) -->
        <div class="search-bar" id="searchBar" style="display: none;">
            <i class="fas fa-search"></i>
            <input type="text" id="searchAccueil" placeholder="Rechercher un produit..." oninput="filterProducts()">
            <i class="fas fa-times" onclick="hideSearch()"></i>
        </div>

        <!-- Nouveautés horizontales -->
        <section class="horiz-section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-star"></i> Nouveautés</h3>
                <span class="section-count" id="newCount">0</span>
            </div>
            <div class="horiz-scroll" id="newProducts"></div>
        </section>

        <!-- Catégorie iPhone -->
        <section class="category-section">
            <div class="section-header">
                <h3 class="section-title"><i class="fab fa-apple"></i> iPhone</h3>
                <span class="section-count" id="iphoneCount">0</span>
            </div>
            <div class="horiz-scroll" id="iphoneProducts"></div>
        </section>

        <!-- Catégorie Samsung -->
        <section class="category-section">
            <div class="section-header">
                <h3 class="section-title"><i class="fab fa-android"></i> Samsung</h3>
                <span class="section-count" id="samsungCount">0</span>
            </div>
            <div class="horiz-scroll" id="samsungProducts"></div>
        </section>

        <!-- Catégorie Accessoires -->
        <section class="category-section">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-headphones"></i> Accessoires</h3>
                <span class="section-count" id="accessoryCount">0</span>
            </div>
            <div class="horiz-scroll" id="accessoryProducts"></div>
        </section>
    </main>

    <footer>
        <p>© 2024 iPhoneCongo • Lubumbashi & Kolwezi</p>
        <p style="margin-top: 0.5rem;">
            <i class="fab fa-whatsapp" style="color: #25d366;"></i> 
            <a href="https://wa.me/243972685669" style="color: var(--gray); text-decoration: none;">+243 972 685 669</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
        </html>
