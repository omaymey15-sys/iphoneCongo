<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhoneCongo - Store Officiel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-mobile-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <div class="header-actions">
            <a href="store.html" class="nav-link">stores</a>
            <i class="fas fa-search search-icon"></i>
        </div>
    </header>

    <main>
        <!-- Hero -->
        <div class="hero">
            <h2>iPhoneCongo</h2>
            <p>Lubumbashi · Kolwezi</p>
        </div>

        <!-- Barre de recherche -->
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Rechercher un produit...">
        </div>

        <!-- Nouveautés -->
        <section class="section">
            <div class="section-header">
                <h3><i class="fas fa-star"></i> Nouveautés</h3>
                <span class="count">10</span>
            </div>
            <div class="grid" id="newProducts"></div>
        </section>

        <!-- iPhone -->
        <section class="section">
            <div class="section-header">
                <h3><i class="fab fa-apple"></i> iPhone</h3>
                <span class="count" id="iphoneCount">0</span>
            </div>
            <div class="grid" id="iphoneProducts"></div>
        </section>

        <!-- Samsung -->
        <section class="section">
            <div class="section-header">
                <h3><i class="fab fa-android"></i> Samsung</h3>
                <span class="count" id="samsungCount">0</span>
            </div>
            <div class="grid" id="samsungProducts"></div>
        </section>

        <!-- Accessoires -->
        <section class="section">
            <div class="section-header">
                <h3><i class="fas fa-headphones"></i> Accessoires</h3>
                <span class="count" id="accessoryCount">0</span>
            </div>
            <div class="grid" id="accessoryProducts"></div>
        </section>
    </main>

    <footer>
        <p>© 2024 iPhoneCongo · Lubumbashi & Kolwezi</p>
        <p class="whatsapp-footer">
            <i class="fab fa-whatsapp"></i> 
            <a href="https://wa.me/243972685669">+243 972 685 669</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
