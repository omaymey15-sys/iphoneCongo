<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>iPhoneCongo - Stores</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-store-alt"></i>
            <h1>iPhone<span>Congo</span></h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="nav-link">accueil</a>
            <i class="fas fa-search search-icon" onclick="toggleSearch()"></i>
        </div>
    </header>

    <main>
        <!-- Barre de recherche -->
        <div class="search-bar" id="searchBar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchStore" placeholder="Rechercher store ou produit..." oninput="filterStores()">
            <i class="fas fa-times" onclick="clearSearch()"></i>
        </div>

        <!-- Bouton ajouter un store -->
        <a href="stores/register.html" class="btn-add-store">
            <i class="fas fa-plus-circle"></i> Ajouter un store
        </a>

        <!-- Filtres -->
        <div class="filters-panel">
            <div class="filter-chip active" onclick="setHourFilter(24)">
                <i class="fas fa-clock"></i> 24h
            </div>
            <div class="filter-chip" onclick="setHourFilter(48)">
                <i class="fas fa-clock"></i> 48h
            </div>
            <div class="filter-chip" onclick="setHourFilter(168)">
                <i class="fas fa-calendar-week"></i> Semaine
            </div>
            <div class="filter-chip" onclick="setHourFilter(720)">
                <i class="fas fa-calendar-month"></i> Mois
            </div>
        </div>

        <!-- Filtre ville -->
        <div class="city-filter">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" id="cityFilter" placeholder="Filtrer par ville..." oninput="filterStores()">
        </div>

        <!-- Résultats -->
        <div class="results-header">
            <span class="results-count" id="resultsCount">0 store trouvé</span>
            <span class="results-sort" onclick="toggleSort()">
                <i class="fas fa-sort"></i> Trier
            </span>
        </div>

        <!-- Liste des stores -->
        <div id="storesList" class="stores-list">
            <div class="loading-spinner">Chargement des stores...</div>
        </div>

        <!-- Message si aucun résultat -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-store"></i>
            <p>Aucun store trouvé</p>
            <p class="small">Soyez le premier à créer votre store !</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Accueil</span>
        </a>
        <a href="store.html" class="nav-item active">
            <i class="fas fa-store"></i>
            <span>Stores</span>
        </a>
        <a href="stores/register.html" class="nav-item">
            <i class="fas fa-plus-circle"></i>
            <span>Créer</span>
        </a>
        <a href="#" class="nav-item" onclick="focusSearch()">
            <i class="fas fa-search"></i>
            <span>Recherche</span>
        </a>
    </nav>

    <script src="stores/stores.js"></script>
    <script src="store.js"></script>
</body>
                </html>
